openapi: 3.0.0
info:
  title: API de Identidad Digital y Firma v3
  description: API para procesos de onboarding digital, validación biométrica y extracción de datos OCR.
  version: 1.0.0

servers:
  - url: "{{BASIC_URL}}/api/ms-digital-identity-profirma"
    description: Servidor de Microservicios de Identidad
  - url: "{{BASIC__URL}}"
    description: Servidor de Autenticación Keycloak

paths:
  /auth/realms/digital_identity/protocol/openid-connect/token:
    post:
      summary: Obtener Token de Acceso (OAuth2)
      tags:
        - Auth
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  example: password
                client_id:
                  type: string
                  example: digital-identity
                client_secret:
                  type: string
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token obtenido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'

  /getOCR:
    post:
      summary: Extracción de datos de Cédula de Identidad (OCR)
      tags:
        - Identidad
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OCRRequest'
      responses:
        '200':
          description: Datos extraídos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OCRResponse'

  /createdoubleidentity/:
    post:
      summary: Crear Registro de Identidad con Biometría
      tags:
        - Validación
      parameters:
        - name: transactionId
          in: query
          description: ID único de transacción para trazabilidad
          required: true
          schema:
            type: string
        - name: token
          in: query
          description: Token temporal de verificación
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityRequest'
      responses:
        '200':
          description: Identidad creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        refresh_expires_in:
          type: integer
        token_type:
          type: string
          example: Bearer

    OCRRequest:
      type: object
      properties:
        obverseImage:
          type: string
          description: Base64 Imagen Anverso CI
        reverseImage:
          type: string
          description: Base64 Imagen Reverso CI

    OCRResponse:
      type: object
      properties:
        fullName:
          type: string
        idNumber:
          type: string
        birthDate:
          type: string

    IdentityRequest:
      type: object
      properties:
        givenNames:
          type: string
          maxLength: 40
        surname1:
          type: string
        surname2:
          type: string
        idNumber:
          type: string
          pattern: '^[0-9]+$'
        issuePlace:
          type: string
          enum: [LP, CB, SC, BN, CH, TJ, PD, OR, BE]
        nationality:
          type: string
          description: Solo mayúsculas, sin espacios.
        personalBiography:
          type: string
          description: Base64 Selfie de biometría (< 1MB)

    IdentityResponse:
      type: object
      properties:
        status:
          type: string
          example: SUCCESS
        transactionId:
          type: string
        verification_token:
          type: string
          description: Token válido por 24 horas para firma digital.
